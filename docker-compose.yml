services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agems
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agems}
      POSTGRES_DB: agems
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agems"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://agems:${POSTGRES_PASSWORD:-agems}@postgres:5432/agems?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-agems-dev-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      API_PORT: 3001
      WEB_URL: ${WEB_URL:-https://agems.ai}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CATALOG_API_URL: ${CATALOG_API_URL:-https://agems.ai}
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    volumes:
      - web_uploads:/app/apps/web/public/uploads
      - web_avatars:/app/apps/web/public/avatars
      - .:/app/host-repo:rw
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    volumes:
      - web_avatars:/app/apps/web/public/avatars
      - web_uploads:/app/apps/web/public/uploads
    depends_on:
      - api

volumes:
  pgdata:
  web_avatars:
  web_uploads:
