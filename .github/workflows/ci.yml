name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agems
          POSTGRES_PASSWORD: agems
          POSTGRES_DB: agems
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://agems:agems@localhost:5432/agems?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck API
        run: pnpm --filter @agems/api lint
        continue-on-error: true

      - name: Typecheck Web
        run: pnpm --filter @agems/web exec tsc --noEmit
        continue-on-error: true

      - name: Build API
        run: pnpm --filter @agems/api build

      - name: Build Web
        run: pnpm --filter @agems/web build
