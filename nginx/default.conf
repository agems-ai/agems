upstream web {
    server web:3000;
}

upstream api {
    server api:3001;
}

server {
    listen 80;
    server_name agems.ai www.agems.ai;
    return 301 https://agems.ai$request_uri;
}

server {
    listen 443 ssl;
    server_name www.agems.ai;
    ssl_certificate /etc/letsencrypt/live/agems.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agems.ai/privkey.pem;
    return 301 https://agems.ai$request_uri;
}

server {
    listen 443 ssl;
    server_name agems.ai;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/agems.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agems.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Serve uploaded files directly from disk
    location /uploads/ {
        alias /srv/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve avatar images directly from disk
    location /avatars/ {
        alias /srv/avatars/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve presentation files directly
    location = /presentation.html {
        alias /srv/uploads/presentation.html;
        add_header Cache-Control "no-cache";
    }
    location = /presentation-ru.html {
        alias /srv/uploads/presentation-ru.html;
        add_header Cache-Control "no-cache";
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
